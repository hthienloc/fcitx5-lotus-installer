name: Auto Release

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      
      - name: Build amd64
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -o lotus-installer-linux-amd64 ./cmd/installer/
      
      - name: Build arm64
        env:
          GOOS: linux
          GOARCH: arm64
        run: go build -o lotus-installer-linux-arm64 ./cmd/installer/
      
      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          release_name: "Latest Build"
          body: |
            Automated build from `main`
            Commit: `${{ github.sha }}`
          files: |
            lotus-installer-linux-amd64
            lotus-installer-linux-arm64
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
