name: Auto Release

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get next version
        id: version
        run: |
          # Get latest release tag via API
          LATEST=$(curl -sf https://api.github.com/repos/${{ github.repository }}/releases/latest | grep -o '"tag_name": *"[^"]*"' | head -1 | cut -d'"' -f4)

          if [[ -z "$LATEST" || "$LATEST" == "null" || "$LATEST" == "latest" ]]; then
            LATEST="v0.2.3"
          fi

          echo "Latest tag: $LATEST"

          # Remove 'v' prefix
          VERSION_NUM="${LATEST#v}"

          # Parse version (handle v0.2.3 format)
          MAJOR=$(echo "$VERSION_NUM" | cut -d'.' -f1)
          MINOR=$(echo "$VERSION_NUM" | cut -d'.' -f2)
          PATCH=$(echo "$VERSION_NUM" | cut -d'.' -f3)

          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          # Increment patch
          PATCH=$((PATCH + 1))

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      
      - name: Build amd64
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -o lotus-installer-linux-amd64 ./cmd/installer/
      
      - name: Build arm64
        env:
          GOOS: linux
          GOARCH: arm64
        run: go build -o lotus-installer-linux-arm64 ./cmd/installer/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_version }}
          release_name: "Release ${{ steps.version.outputs.new_version }}"
          body: |
            Automated release from `main`
            Commit: `${{ github.sha }}`
          files: |
            lotus-installer-linux-amd64
            lotus-installer-linux-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
